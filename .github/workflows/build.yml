name: Build Worker EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller selenium requests beautifulsoup4 webdriver-manager pyngrok

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "SLBFE_Worker" worker.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SLBFE_Worker_Windows
          path: dist/SLBFE_Worker.exe
          retention-days: 30
