name: Build Worker EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller selenium requests beautifulsoup4 webdriver-manager pyngrok

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "SLBFE_Worker" `
            --hidden-import=selenium `
            --hidden-import=selenium.webdriver `
            --hidden-import=selenium.webdriver.chrome `
            --hidden-import=selenium.webdriver.chrome.webdriver `
            --hidden-import=selenium.webdriver.chrome.options `
            --hidden-import=selenium.webdriver.chrome.service `
            --hidden-import=selenium.webdriver.common.by `
            --hidden-import=selenium.webdriver.support `
            --hidden-import=selenium.webdriver.support.ui `
            --hidden-import=selenium.webdriver.support.expected_conditions `
            --hidden-import=webdriver_manager `
            --hidden-import=webdriver_manager.chrome `
            --collect-all selenium `
            --collect-all webdriver_manager `
            worker.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SLBFE_Worker_Windows
          path: dist/SLBFE_Worker.exe
          retention-days: 30
